myRole:
  - title: 大会发起与主理
    description: 负责大会整体定位、议题策划与生态资源整合，推动边缘计算行业对话平台建设。
  - title: 议程与嘉宾
    description: 参与核心议题设计，连接开发者、产业方与基础设施领域的技术专家。
  - title: 内容资产沉淀
    description: 推动演讲内容、社区讨论与后续文章复盘，形成可持续的行业记录。
