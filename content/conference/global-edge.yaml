title: 全球边缘计算大会
subtitle: Global Edge Computing Conference
website: https://gecc.cn
summary: >
  面向边缘计算、云计算与 AI 基础设施的行业聚会，汇聚开发者、架构师与产业方，
  讨论边缘智能、云边协同与基础设施演进。大会官网持续更新议程、嘉宾与历届资料。
positioning: >
  聚焦「基础设施走向边缘与真实场景」的交叉地带，强调全球视野、技术深度与产业连接，
  区别于单一厂商发布会或纯学术会议，定位为行业共建型技术峰会。
background: >
  边缘计算从概念走向规模化部署，产业需要持续对话的平台：连接开源社区、云厂商、
  设备商与行业用户。全球边缘计算大会在此背景下发起，旨在为生态提供可持续的
  线下聚会与内容沉淀。
themes:
  - 边缘智能与推理下沉
  - 云边协同与分布式架构
  - AI Infra 与异构算力
  - 开发者生态与开源实践
  - 产业数字化与场景落地
editions:
  - year: 2024
    theme: 边缘智能与基础设施演进
    location: 中国
  - year: 2023
